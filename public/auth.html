<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Poplist - Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg:#eceef2; --card:#fff; --border:#d4d7dd; --t1:#111; --t2:#6b7280; --blue:#3b82f6;
      --rp:16px; --sh:0 2px 10px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--t1);
      font-family: "Plus Jakarta Sans", system-ui, sans-serif; display: grid; place-items: center; padding: 20px;
    }
    .card {
      width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; box-shadow: var(--sh); padding: 22px;
    }
    .logo { text-align: center; font-size: 22px; font-weight: 900; letter-spacing: -.4px; margin-bottom: 12px; }
    .logo em {
      display:inline-block; width:8px; height:8px; background: var(--blue); border-radius:50%;
      margin-left:2px; vertical-align: super; font-style: normal;
    }
    h1 { margin: 0 0 16px; text-align: center; font-size: 20px; }
    p.sub { margin: 0 0 18px; text-align: center; color: var(--t2); font-size: 13px; line-height: 1.6; }
    .btn, input {
      width: 100%; border-radius: var(--rp); border: 1px solid var(--border); padding: 12px 14px; font: inherit;
      min-height: 44px;
    }
    .btn { background: #fff; font-weight: 700; cursor: pointer; }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn + .btn, input + input, .field { margin-top: 10px; }
    .sep { text-align: center; color: var(--t2); font-size: 12px; margin: 14px 0; }
    .row { margin-top: 10px; }
    .create-link {
      margin-top: 10px;
      width: auto;
      display: inline-block;
      border: none;
      background: transparent;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
    }
    .create-link:hover { text-decoration: underline; }
    .note { margin-top: 12px; font-size: 12px; color: var(--t2); text-align: center; min-height: 16px; }
    .back { margin-top: 12px; text-align: center; }
    .back a { color: var(--t2); text-decoration: none; font-size: 12px; }
    .google-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; font-weight: 600;
    }
    .google-icon {
      width: 18px; height: 18px; display: inline-block;
    }
    .field-wrap {
      position: relative; margin-top: 10px;
    }
    .field-wrap input {
      padding-right: 40px;
    }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--t2); cursor: pointer; border: none; background: transparent;
    }
    .pw-toggle svg {
      width: 16px; height: 16px;
    }
    .toast {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%) translateY(10px);
      padding: 10px 16px; border-radius: 999px;
      background: rgba(17,17,17,.9); color: #fff; font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.25); opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 30;
      max-width: min(92vw, 420px); text-align: center;
    }
    .toast.show {
      opacity: 1; transform: translate(-50%, -50%) translateY(0);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Poplist<em></em></div>
    <h1>Sign in</h1>
    <p class="sub">Use Google or your email address.</p>

    <button class="btn google-btn" id="googleBtn">
      <span class="google-icon">
        <!-- Official Google "G" logo per brand guidelines -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2045c0-.638-.0573-1.2518-.1636-1.8409H9v3.4818h4.8445a4.1327 4.1327 0 0 1-1.7963 2.7137v2.2564h2.9082c1.7037-1.5682 2.6836-3.8786 2.6836-6.611Z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.4673-.8055 5.9564-2.184L12.0482 13.56c-.8273.5555-1.8873.8827-3.0482.8827-2.3445 0-4.3282-1.5846-5.0373-3.7137H.9391v2.3328A8.9973 8.9973 0 0 0 9 18Z"/>
          <path fill="#FBBC05" d="M3.9627 10.729c-.1864-.5554-.2937-1.1518-.2937-1.7645 0-.6128.1073-1.2091.2937-1.7646V4.8673H.9391A8.9973 8.9973 0 0 0 0 8.9645c0 1.45.3473 2.8227.9391 4.0973l3.0236-2.3328Z"/>
          <path fill="#EA4335" d="M9 3.5455c1.3209 0 2.5073.4545 3.4409 1.3455l2.5828-2.5827C13.4627.9273 11.4255 0 9 0 5.5673 0 2.6455 1.8964.9391 4.8673L3.9627 7.2C4.6718 5.0709 6.6555 3.5455 9 3.5455Z"/>
        </svg>
      </span>
      <span>Continue with Google</span>
    </button>
    <div class="sep">or</div>

    <input class="field" id="email" type="email" placeholder="Email address" autocomplete="email" />
    <div class="field-wrap">
      <input id="password" type="password" placeholder="Password (6+ characters)" autocomplete="current-password" />
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="row">
      <button class="btn primary" id="emailSignInBtn">Sign in</button>
    </div>
    <button class="create-link" id="emailCreateBtn" type="button">Create account</button>

    <div class="note" id="msg"></div>
    <div class="back"><a href="/">Back to app</a></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDzGLbfZHBt-IrFfVSL-altSvl_MCJltE8",
      authDomain: "poplist-ai.firebaseapp.com",
      projectId: "poplist-ai",
      storageBucket: "poplist-ai.firebasestorage.app",
      messagingSenderId: "626209561981",
      appId: "1:626209561981:web:f608569b981c2f56c18014"
    };

    const msg = document.getElementById('msg');
    const toast = document.getElementById('toast');
    const say = (t) => { msg.textContent = t || ''; };
    const showToast = (text) => {
      if (!toast) return;
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    };
    let auth = null;

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      auth = firebase.auth();
    } catch (e) {
      // If default app already exists or other non-fatal error, try to grab auth anyway
      try { auth = firebase.auth(); } catch (_) {}
      if (!auth) {
        say('Unable to connect to sign-in service. Please try again in a moment.');
      }
    }

    if (auth) {
      auth.onAuthStateChanged((user) => {
        if (user) {
          showToast('Signed in as ' + (user.email || 'Poplist user'));
          setTimeout(() => { window.location.href = '/'; }, 800);
        }
      });
    }

    document.getElementById('googleBtn').addEventListener('click', async () => {
      if (!auth) return;
      say('');
      try {
        await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        // onAuthStateChanged will handle toast + redirect
      } catch (e) {
        if (e.code === 'auth/popup-closed-by-user') return;
        say(mapError(e.code));
      }
    });

    function isBlockedPlusAliasEmail(email) {
      if (!email || typeof email !== 'string') return false;
      const at = email.indexOf('@');
      if (at <= 0) return false;
      return email.slice(0, at).includes('+');
    }

    async function emailAuth(isCreate) {
      if (!auth) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { say('Enter email and password.'); return; }
      if (isBlockedPlusAliasEmail(email)) {
        say("Email addresses with '+' in the name (e.g. name+tag@mail.com) aren't allowed.");
        return;
      }
      say('');
      try {
        if (isCreate) {
          await auth.createUserWithEmailAndPassword(email, password);
          showToast('Account created. Signing you in…');
        } else {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('Signed in. Opening Poplist…');
        }
        // onAuthStateChanged will redirect
      } catch (e) {
        say(mapError(e.code));
      }
    }

    document.getElementById('emailSignInBtn').addEventListener('click', () => emailAuth(false));
    document.getElementById('emailCreateBtn').addEventListener('click', () => emailAuth(true));

    // Password show / hide
    document.getElementById('pwToggle').addEventListener('click', () => {
      const pw = document.getElementById('password');
      if (!pw) return;
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      document.getElementById('pwToggle').setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    function mapError(code) {
      switch (code) {
        case 'auth/invalid-email':
          return 'Please enter a valid email address.';
        case 'auth/user-not-found':
          return 'No account found for this email.';
        case 'auth/wrong-password':
          return 'Incorrect password. Try again or reset it.';
        case 'auth/email-already-in-use':
          return 'An account already exists with this email.';
        case 'auth/weak-password':
          return 'Password should be at least 6 characters.';
        case 'auth/network-request-failed':
          return 'Network error. Please check your connection and try again.';
        default:
          return 'Something went wrong. Please try again.';
      }
    }
  </script>
</body>
</html>
