<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Logo — Pink</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #fff;
    min-height: 100vh;
    padding: 64px 24px;
  }

  h1 {
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 64px;
  }

  .row {
    display: flex;
    gap: 48px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 80px;
  }

  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* App Store icon container — rounded square, like iOS App Store */
  .icon-wrap {
    width: 280px;
    height: 280px;
    border-radius: 63px; /* iOS icon radius ≈ 22.5% of 280 */
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .icon-wrap.dark {
    background: #000;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 20px 60px rgba(236, 72, 153, 0.25),
      0 8px 24px rgba(0,0,0,0.6);
  }

  .icon-wrap.light {
    background: #fff;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.06),
      0 20px 60px rgba(236, 72, 153, 0.18),
      0 8px 24px rgba(0,0,0,0.12);
  }

  .icon-wrap.pink-bg {
    background: linear-gradient(145deg, #2d0a1a 0%, #1a0510 100%);
    box-shadow:
      0 0 0 1px rgba(236,72,153,0.18),
      0 20px 60px rgba(236, 72, 153, 0.35),
      0 8px 24px rgba(0,0,0,0.5);
  }

  .icon-wrap img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* Section divider */
  .divider {
    width: 100%;
    max-width: 720px;
    margin: 0 auto 80px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .divider span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    white-space: nowrap;
  }

  /* Large showcase -->
  .showcase {
    display: flex;
    justify-content: center;
    margin-bottom: 80px;
  }
  .showcase .icon-wrap {
    width: 380px;
    height: 380px;
    border-radius: 86px;
  }

  /* Raw SVG side by side, no clip -->
  .raw-row {
    display: flex;
    gap: 32px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 80px;
  }
  .raw-row img {
    width: 220px;
    height: 220px;
  }
</style>
</head>
<body>

  <h1>Poplist · App Store Logo · Pink</h1>

  <!-- Hero / large showcase -->
  <div class="showcase">
    <div class="tile">
      <div class="icon-wrap dark">
        <img src="/logo-appstore-pink.svg" alt="Poplist App Store icon, dark">
      </div>
    </div>
  </div>

  <div class="divider"><span>All backgrounds</span></div>

  <!-- Three backgrounds side by side -->
  <div class="row">
    <div class="tile">
      <div class="icon-wrap dark">
        <img src="/logo-appstore-pink.svg" alt="Dark bg">
      </div>
      <span class="label">Dark</span>
    </div>

    <div class="tile">
      <div class="icon-wrap light">
        <img src="/logo-appstore-pink.svg" alt="Light bg">
      </div>
      <span class="label">Light</span>
    </div>

    <div class="tile">
      <div class="icon-wrap pink-bg">
        <img src="/logo-appstore-pink.svg" alt="Pink bg">
      </div>
      <span class="label">Pink tint</span>
    </div>
  </div>

  <div class="divider"><span>Raw · no clip</span></div>

  <!-- Raw SVG without clipping, so you can see the full composition -->
  <div class="raw-row">
    <img src="/logo-appstore-pink.svg" alt="Raw SVG full composition">
  </div>

</body>
</html>
