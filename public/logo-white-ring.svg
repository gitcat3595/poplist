<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- White background -->
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- Large circle — RIM style: thick stroke, no fill -->
  <circle cx="210" cy="285" r="168"
    fill="none"
    stroke="#2a2a2a"
    stroke-width="6"/>
  <!-- inner rim line for depth -->
  <circle cx="210" cy="285" r="162"
    fill="none"
    stroke="#999999"
    stroke-width="1.5"
    opacity="0.5"/>

  <!-- Small rounded-square — RING style: thin stroke, no fill -->
  <rect x="268" y="72" width="158" height="158" rx="42" ry="42"
    fill="none"
    stroke="#888888"
    stroke-width="3"/>
</svg>
